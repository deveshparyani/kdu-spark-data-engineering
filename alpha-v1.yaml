# Viewstack ETL config for client alpha.
# Upload this file to:
# s3://<data-lake-bucket>/configs/client=alpha/v1.yaml
#
# Expected raw files:
# - raw/client=alpha/file_type=codes/creator_alpha_codes.csv
# - raw/client=alpha/file_type=orders/creator_alpha_orders.csv

pipeline:
  name: viewstack
  schema_version: v1

client:
  id: alpha
  description: "Orders joined to codes on normalized code, then aggregated by date and discount_code."

source_format: csv
partition_column: date
date_column: date

rename_columns:
  order_date: order_date_raw
  code: code
  subtotal_price: subtotal_price_raw
  new_vs_repeat: new_vs_repeat
  subs_vs_non: subs_vs_non

cleaning_rules:
  code: lowercase

joins:
  - name: orders_to_codes
    path: "s3://<data-lake-bucket>/raw/client=alpha/file_type=codes/"
    format: csv
    keys:
      - code
    column_mapping:
      Promo Code: code
    how: inner
    normalization:
      trim: true
      lowercase: true
    quarantine_on_unmatched: true
    quarantine_reason: code_not_found_in_codes_file

transformations:
  cast_columns: {}
  fill_nulls: {}
  derived_columns:
    - name: date
      expression: >
        COALESCE(
          to_date(order_date_raw, 'yyyy-MM-dd'),
          to_date(order_date_raw, 'MM/dd/yyyy'),
          to_date(order_date_raw, 'M/d/yyyy'),
          to_date(order_date_raw, 'dd-MM-yyyy'),
          to_date(order_date_raw, 'dd/MM/yyyy'),
          to_date(order_date_raw, 'yyyy/MM/dd'),
          to_date(order_date_raw, 'MMM d, yyyy'),
          to_date(order_date_raw, 'MMMM d, yyyy'),
          to_date(order_date_raw)
        )
    - name: subtotal_price
      expression: "CAST(regexp_replace(trim(subtotal_price_raw), '[^0-9.\\-]', '') AS DOUBLE)"
    - name: client_id
      expression: "'alpha'"
  filter_expressions:
    - "date IS NOT NULL"
    - "code IS NOT NULL"
    - "subtotal_price IS NOT NULL"

drop_columns: []

aggregation:
  group_by:
    - date
    - discount_code
  metrics:
    - column: code
      function: count
      alias: orders
    - column: subtotal_price
      function: sum
      alias: revenue

gold_aggregations:
  group_by:
    - date
    - discount_code
  metrics:
    - column: subtotal_price
      function: sum
      alias: revenue
    - column: code
      function: count
      alias: orders

common_cleaning:
  date_parsing_rules:
    target_column: date
    accepted_formats:
      - yyyy-MM-dd
      - MM/dd/yyyy
      - M/d/yyyy
      - dd-MM-yyyy
      - dd/MM/yyyy
      - yyyy/MM/dd
      - MMM d, yyyy
      - MMMM d, yyyy
  numeric_cleaning:
    target_columns:
      - subtotal_price_raw
    remove_currency_symbols: true
    remove_thousands_separators: true
    normalize_decimal_separator: "."
  text_normalization:
    trim_columns:
      - code
    lowercase_columns:
      - code
  missing_value_strategy:
    drop_rows_when_missing:
      - order_date_raw
      - code
      - subtotal_price_raw

quarantine_rules:
  - name: code_not_found
    condition: "discount_code IS NULL"
    reason: code_not_found_in_codes_file

post_processing:
  column_renaming:
    date: date
    client_id: client_id
    revenue: revenue
    orders: orders
    discount_code: discount_code
  sorting_rules:
    - column: date
      direction: asc
    - column: discount_code
      direction: asc
  filtering_rules:
    - "discount_code IS NOT NULL"

outputs:
  loaded_path: "s3://<data-lake-bucket>/processed/client=alpha/"
  quarantine_path: "s3://<data-lake-bucket>/quarantine/client=alpha/"
  loaded_schema:
    - name: date
      type: date
    - name: discount_code
      type: string
    - name: orders
      type: bigint
    - name: revenue
      type: double
    - name: client_id
      type: string
  quarantine_schema:
    - name: order_date
      type: string
    - name: code
      type: string
    - name: subtotal_price
      type: string
    - name: new_vs_repeat
      type: string
    - name: subs_vs_non
      type: string
    - name: quarantine_reason
      type: string
